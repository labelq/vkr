// ========== ROUTER ==========
const Router = {
  current: '/',
  params: {},
  go(path) {
    window.location.hash = '#' + path;
  },
  parse() {
    const hash = window.location.hash.slice(1) || '/';
    const parts = hash.split('/').filter(Boolean);
    const route = '/' + (parts[0] || '');
    const params = {};
    if (parts[1]) params.id = parts[1];
    if (parts[2]) params.sub = parts[2];
    if (parts[3]) params.subId = parts[3];
    this.current = hash;
    this.params = params;
    return { route, parts, params };
  },
  init() {
    window.addEventListener('hashchange', () => App.render());
    App.render();
  }
};

}

// ========== TOAST ==========
function toast(msg, type='info') {
  const c = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ========== MARKDOWN renderer (simple) ==========
function renderMd(md) {
  if (!md) return '';
  let html = md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```([\s\S]*?)```/g, (_, c) => `<pre><code>${c.trim()}</code></pre>`)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^\| (.+) \|$/gm, row => {
      const cells = row.split('|').map(c=>c.trim()).filter(Boolean);
      if (cells.every(c=>c.match(/^[-:]+$/))) return '';
      const tag = cells[0] === cells[0].toUpperCase() && cells.length > 1 && cells[0].length < 30 ? 'th' : 'td';
      return '<tr>' + cells.map(c=>`<${tag}>${c}</${tag}>`).join('') + '</tr>';
    })
    .replace(/((<tr>.*<\/tr>\n?)+)/gs, m => `<table>${m}</table>`)
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g, m => m.includes('\n') ? m : `<ul>${m}</ul>`)
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
  return `<p>${html}</p>`;
}

function StatusBadge(status) {
  const map = { open: ['badge-red','Открыто'], in_progress: ['badge-yellow','В работе'], closed: ['badge-green','Закрыто'] };
  const [cls, label] = map[status] || ['badge-gray', status];
  return `<span class="badge ${cls}">${label}</span>`;
}

// ---- COURSES ----
Pages.courses = function(user) {
  const COURSES = Store.getCourses();
  const categories = [{id:'all',label:'Все курсы'},{id:'os',label:'Операционные системы'},{id:'skzi',label:'СКЗИ'},{id:'office',label:'Офисное ПО'}];
  const filterParam = window._courseFilter || 'all';
  const filtered = filterParam === 'all' ? COURSES : COURSES.filter(c => c.category === filterParam);

  const cards = filtered.map(c => {
    const pct = Store.getCourseProgress(c.id);
    const totalL = (c.modules||[]).reduce((s,m)=>s+(m.lessons||[]).length,0);
    const doneL = (c.modules||[]).flatMap(m=>m.lessons||[]).filter(l=>Store.isCompleted(l.id)).length;
    const idx = COURSES.indexOf(c);
    const ghost = String(idx + 1).padStart(2, '0');
    const statusBadge = pct===100
      ? '<span class="badge badge-green">✓ Пройден</span>'
      : pct > 0 ? '<span class="badge badge-blue">В процессе</span>'
      : '<span class="badge badge-gray">Не начат</span>';
    return `
    <div class="course-card" data-nav="/courses/${c.id}">
      <div class="course-card-banner" style="background:${c.color}">
        <div class="course-card-ghost">${ghost}</div>
        <span class="course-card-chip">${c.categoryLabel}</span>
      </div>
      <div class="course-card-body">
        <div class="flex-between mb-2" style="margin-bottom:8px">${statusBadge}<span></span></div>
        <div class="course-card-title">${c.title}</div>
        <div class="course-card-desc">${c.description}</div>
        ${ProgressBar(pct)}
        <div class="progress-label"><span>${doneL} из ${totalL} уроков</span><span>${pct}%</span></div>
        <div style="margin-top:14px"><button class="btn btn-primary btn-sm w-full">Перейти к курсу →</button></div>
      </div>

  const filters = categories.map(cat =>
    `<button class="filter-btn ${filterParam===cat.id?'active':''}" data-filter="${cat.id}">${cat.label}</button>`
  ).join('');

  return Layout(user, 'Каталог курсов',
  `<div class="filter-bar">${filters}</div>

};

// ---- HELPERS ----
function isLessonAccessible(lesson, mod) {
  const idx = (mod.lessons||[]).indexOf(lesson);
  if (idx === 0) return true;
  const prev = mod.lessons[idx - 1];
  return Store.isCompleted(prev.id);
}

  const pct = Store.getCourseProgress(course.id);

  const modules = (course.modules||[]).map(mod => {
    const lessonRows = (mod.lessons||[]).map(l => {
      const done = Store.isCompleted(l.id);
      const locked = !isLessonAccessible(l, mod);

    return `
    <div class="module-tree mb-4">

// ---- LESSON VIEWER ----
Pages.lesson = function(user, lessonId) {
  const COURSES = Store.getCourses();
  const allLessons = COURSES.flatMap(c => (c.modules||[]).flatMap(m => m.lessons||[]));
  const lesson = allLessons.find(l => l.id === parseInt(lessonId));
  if (!lesson) return Layout(user, 'Не найдено', '<p>Урок не найден</p>');
  const mod = COURSES.flatMap(c => c.modules||[]).find(m => m.id === lesson.module_id);
  const course = COURSES.find(c => (c.modules||[]).some(m => m.id === lesson.module_id));

  // Блокировка: доступ только если предыдущий урок пройден (раздел 2.8)
  if (!mod || !isLessonAccessible(lesson, mod)) {
    const prevLesson = mod && mod.lessons[mod.lessons.indexOf(lesson) - 1];
    return Layout(user, '🔒 Урок заблокирован',
    `<div class="breadcrumb"><a href="#" data-nav="/courses">Курсы</a><span class="breadcrumb-sep">/</span><a href="#" data-nav="/courses/${course.id}">${course.title}</a><span class="breadcrumb-sep">/</span><span>${lesson.title}</span></div>
     <div style="max-width:500px;margin:0 auto;text-align:center;padding:60px 20px">
       <div style="font-size:64px;margin-bottom:24px">🔒</div>
       <h2 style="font-size:22px;font-weight:700;margin-bottom:12px">Урок заблокирован</h2>
       <p style="color:var(--t2);font-size:15px;margin-bottom:28px">Чтобы открыть этот урок, необходимо успешно пройти тест к предыдущему уроку (минимальный балл — 75%).</p>
       ${prevLesson ? `<button class="btn btn-primary" data-nav="/lesson/${prevLesson.id}">Вернуться к предыдущему уроку ${Icon.arrow_right}</button>` : `<button class="btn btn-secondary" data-nav="/courses/${course?.id || ''}">К курсу</button>`}
     </div>`);
  }

  const done = Store.isCompleted(lesson.id);
  const hasTest = !!lesson.testId;
  const idx = (mod.lessons||[]).indexOf(lesson);
  const nextLesson = mod.lessons[idx + 1];
  const nextAccessible = nextLesson && isLessonAccessible(nextLesson, mod);

  // Видеоплеер (раздел 2.5 — "При наличии видеоматериалов предусмотрена интеграция HTML5-видеоплеера")
  const videoBlock = lesson.video_url ? `
    <div style="margin-bottom:20px;border-radius:12px;overflow:hidden;background:#000">
      <video controls style="width:100%;max-height:360px">
        <source src="${lesson.video_url}" type="video/mp4">
        Ваш браузер не поддерживает видео.
      </video>
    </div>` : '';

  return Layout(user, lesson.title,
  `<div class="breadcrumb">
    <a href="#" data-nav="/courses">Курсы</a><span class="breadcrumb-sep">/</span>
    <a href="#" data-nav="/courses/${course.id}">${course.title}</a><span class="breadcrumb-sep">/</span>
    <span>${lesson.title}</span>
   </div>
   <div style="display:grid;grid-template-columns:1fr 280px;gap:24px;align-items:start">
     <div class="lesson-container">
       ${done ? '<div style="background:#dcfce7;border:1px solid #bbf7d0;border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:14px;color:#15803d;font-weight:600">✓ Урок завершён</div>' : ''}
       ${videoBlock}
       <div class="lesson-content">${renderMd(lesson.content)}</div>
       <div style="display:flex;justify-content:space-between;margin-top:20px;gap:12px">
         ${idx > 0 ? `<button class="btn btn-secondary" data-nav="/lesson/${mod.lessons[idx-1].id}">${Icon.arrow_left} Предыдущий</button>` : '<div></div>'}
         <div style="display:flex;gap:8px">
           ${hasTest ? `<button class="btn btn-primary" data-nav="/test/${lesson.id}">Пройти тест ${Icon.arrow_right}</button>` :
             nextLesson ? `<button class="btn btn-primary" data-nav="/lesson/${nextLesson.id}">Следующий урок ${Icon.arrow_right}</button>` :
             `<button class="btn btn-success" data-nav="/courses/${course.id}">К списку уроков ${Icon.check}</button>`}
           <button class="btn btn-secondary btn-sm" data-action="support-from-lesson" data-lesson-title="${lesson.title}" data-course="${course.title}" title="Задать вопрос по уроку">${Icon.ticket}</button>
         </div>
       </div>
     </div>
     <div>
       <div class="card mb-3">
         <div class="card-body">
           <div style="font-size:13px;font-weight:600;color:var(--t);margin-bottom:12px">Содержание модуля</div>
           ${(mod.lessons||[]).map(l => {
             const isDone = Store.isCompleted(l.id);
             const isCurrent = l.id === lesson.id;
             const isLocked = !isLessonAccessible(l, mod);
             return `<div class="lesson-row" ${!isLocked ? `data-nav="/lesson/${l.id}"` : 'style="opacity:0.5;cursor:not-allowed"'} style="${isCurrent?'background:#f0f4ff;':''}">
               <div class="lesson-row-left">
                 <div class="lesson-status-icon ${isDone?'done':isCurrent?'current':'locked'}" style="width:22px;height:22px">
                   ${isDone ? '<span style="color:var(--ok);font-size:12px">✓</span>' : isLocked ? '<span style="font-size:12px">🔒</span>' : isCurrent ? '<span style="color:var(--p);font-size:10px;font-weight:700">▶</span>' : ''}
                 </div>
                 <div style="font-size:13px;${isCurrent?'font-weight:600;color:var(--p)':''}">${l.title}</div>
               </div>
             </div>`;
           }).join('')}
         </div>
       </div>
       <div class="card">
         <div class="card-body" style="padding:14px 16px">
           <div style="font-size:12px;font-weight:600;color:var(--t2);margin-bottom:8px">КОНТЕКСТ УРОКА</div>
           <div style="font-size:12px;color:var(--t2)">Курс: <b style="color:var(--t)">${course?.title || ''}</b></div>
           <div style="font-size:12px;color:var(--t2);margin-top:4px">Урок: <b style="color:var(--t)">${idx+1} из ${(mod?.lessons||[]).length}</b></div>
         </div>
       </div>
     </div>
   </div>`);
};

// ---- TEST PAGE ----
Pages.test = function(user, lessonId) {
  const COURSES = Store.getCourses();
  const allLessons = COURSES.flatMap(c => (c.modules||[]).flatMap(m => m.lessons||[]));
  const lesson = allLessons.find(l => l.id === parseInt(lessonId));
  if (!lesson) return Layout(user, 'Ошибка', '<p>Урок не найден</p>');
  const test = window._currentTest;
  if (!test) return Layout(user, 'Ошибка', '<p>Тест не загружен</p>');
  const course = COURSES.find(c => (c.modules||[]).some(m => (m.lessons||[]).some(l => l.id === lesson.id)));
  const mod = COURSES.flatMap(c=>c.modules||[]).find(m=>m.id===lesson.module_id);
  const nextLesson = mod?.lessons[(mod.lessons||[]).indexOf(lesson) + 1];

  const state = window._testState || { answers: {}, submitted: false, score: 0 };
  window._testState = state;

  if (state.submitted) {
    const pass = state.score >= 75;
    return Layout(user, test.title,
    `<div class="result-screen">
      <div class="result-circle ${pass?'pass':'fail'}">${state.score}%</div>
      <div class="result-title">${pass ? '🎉 Тест пройден!' : '❌ Попробуйте ещё раз'}</div>
      <div class="result-subtitle">${pass ? `Отличная работа! Минимальный порог — 75%. Вы набрали ${state.score}%.` : `Недостаточно баллов. Перечитайте урок и попробуйте снова.`}</div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        ${!pass ? `<button class="btn btn-secondary" data-action="retry-test">Попробовать снова</button>` : ''}
        <button class="btn btn-secondary" data-nav="/lesson/${lesson.id}">Вернуться к уроку</button>
        ${pass && nextLesson ? `<button class="btn btn-primary" data-nav="/lesson/${nextLesson.id}">Следующий урок ${Icon.arrow_right}</button>` : ''}
        ${pass && !nextLesson ? `<button class="btn btn-success" data-nav="/courses/${course.id}">К курсу ${Icon.check}</button>` : ''}
      </div>
    </div>`);
  }

  const questions = test.questions.map((q, qi) => {
    const sel = state.answers[q.id] || [];
    const isMultiple = q.type === 'multiple';
    const answers = q.answers.map(a => {
      const isSelected = sel.includes(a.id);
      return `
      <div class="quiz-answer ${isSelected?'selected':''}" data-q="${q.id}" data-a="${a.id}" data-multi="${isMultiple}">
        <div class="${isMultiple?'quiz-checkbox':'quiz-radio'}">${isSelected ? (isMultiple ? '<svg viewBox="0 0 12 12" fill="white" width="10" height="10"><path d="M10 3L5 8.5 2 5.5"/></svg>' : '<div class="quiz-radio-dot"></div>') : ''}</div>
        <div class="quiz-answer-text">${a.text}</div>
      </div>`;
    }).join('');
    return `<div class="quiz-question"><div class="quiz-question-text">${qi+1}. ${q.text}${isMultiple?'<span class="badge badge-blue" style="margin-left:8px;font-size:11px">Несколько вариантов</span>':''}</div><div class="quiz-answers">${answers}</div></div>`;
  }).join('');

  return Layout(user, test.title,
  `<div class="breadcrumb"><a href="#" data-nav="/courses/${course.id}">${course.title}</a><span class="breadcrumb-sep">/</span><a href="#" data-nav="/lesson/${lesson.id}">${lesson.title}</a><span class="breadcrumb-sep">/</span><span>Тест</span></div>

};

Pages.profile = function(user) {
  const prog = Object.values(Store.getProgress());

  const roleLabel = {user:'Сотрудник',moderator:'Модератор',admin:'Администратор'}[user.role];

  const initials = user.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

  const courseProgress = Store.getCourses().map(c => {
    const pct = Store.getCourseProgress(c.id);
    return pct > 0 ? `
    <div style="margin-bottom:16px">
      <div class="flex-between mb-2"><span style="font-size:14px;font-weight:600">${c.title}</span><span style="font-size:13px;color:var(--t2)">${pct}%</span></div>

  `<div style="display:grid;grid-template-columns:300px 1fr;gap:24px;align-items:start">
    <div class="card">
      <div class="card-body text-center">

        <div style="font-size:18px;font-weight:700;color:var(--t);margin-bottom:6px">${user.name}</div>
        <div style="margin-bottom:12px"><span class="role-badge ${roleCls}">${roleLabel}</span></div>
        <div style="font-size:13px;color:var(--t2);margin-bottom:4px">📧 ${user.email}</div>
        ${user.department ? `<div style="font-size:13px;color:var(--t2)">🏢 ${user.department}</div>` : ''}

          <div style="background:#f8fafc;border-radius:10px;padding:12px;text-align:center">
            <div style="font-size:22px;font-weight:800;color:var(--p)">${completedLessons}</div>

    open: analytics.openTickets || 0,
    in_progress: analytics.inProgressTickets || 0,
    closed: analytics.closedTickets || 0
  };

  return Layout(user, 'Аналитика',
  `<div class="stats-grid mb-6">
    ${StatCard(Icon.users,  analytics.users || 0,            'Пользователей',       '#5b52f0', '#eeeeff')}
    ${StatCard(Icon.check,  analytics.completedLessons || 0, 'Завершений уроков',   '#047857', '#ecfdf5')}
    ${StatCard(Icon.star,   (analytics.avgScore || 0) + '%', 'Средний балл',        '#7c3aed', '#f4f0ff')}
    ${StatCard(Icon.ticket, analytics.tickets || 0,          'Всего обращений',     '#c53030', '#fff5f5')}
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
    <div class="card">
      <div class="card-body">
        <div class="section-heading">Активность по курсам</div>
        ${courseRows || '<div class="text-muted">Нет данных</div>'}
      </div>
    </div>
    <div class="card">
      <div class="card-body">
        <div class="section-heading">Обращения в поддержку</div>
        <div style="display:flex;flex-direction:column;gap:12px;margin-top:8px">
          <div class="flex-between"><span style="font-size:14px">🔴 Открытые</span><span class="badge badge-red">${byStatus.open}</span></div>
          <div class="flex-between"><span style="font-size:14px">🟡 В работе</span><span class="badge badge-yellow">${byStatus.in_progress}</span></div>
          <div class="flex-between"><span style="font-size:14px">🟢 Закрытые</span><span class="badge badge-green">${byStatus.closed}</span></div>
        </div>
        <div class="divider"></div>
        <div class="section-heading" style="margin-top:0">Пользователи по ролям</div>
        ${allUsers.length ? Object.entries(allUsers.reduce((acc,u)=>{acc[u.role]=(acc[u.role]||0)+1;return acc;},{})).map(([role,count]) => {
          const labels = {user:'Сотрудники',moderator:'Модераторы',admin:'Администраторы'};
          const pct = Math.round((count/allUsers.length)*100);
          return `<div style="margin-bottom:10px"><div class="flex-between mb-1"><span style="font-size:13px">${labels[role]||role}</span><span style="font-size:13px;color:var(--t2)">${count}</span></div>${ProgressBar(pct)}</div>`;
        }).join('') : ''}
      </div>
    </div>
  </div>`);
};

// ========== APP ==========
const App = {
  async render() {
    const { route, parts, params } = Router.parse();
    const user = Auth.getUser();
    const app = document.getElementById('app');

    // Public routes
    if (route === '/') { app.innerHTML = Pages.landing(); return; }
    if (route === '/login') { app.innerHTML = Pages.login(window._authTab || 'login'); window._authTab = null; return; }

    // Protected routes
    if (!user) { Router.go('/login'); return; }

    // Ensure courses + progress are loaded
    if (!Store._courses) {
      showLoading();
      await Promise.all([Store.loadCourses(), Store.loadProgress()]);
    }

    if (route === '/dashboard') { app.innerHTML = Pages.dashboard(user); return; }
    if (route === '/courses') {
      if (parts[1]) { app.innerHTML = Pages.courseDetail(user, parts[1]); }
      else { app.innerHTML = Pages.courses(user); }
      return;
    }
    if (route === '/lesson') {
      // Reload progress so lesson status is fresh
      await Store.loadProgress();
      app.innerHTML = Pages.lesson(user, parts[1]);
      return;
    }
    if (route === '/test') {
      // Load test data from API
      const lessonId = parts[1];
      try {
        window._currentTest = await API.lessons.getTest(lessonId);
      } catch (e) {
        window._currentTest = null;
      }
      window._testState = null;
      app.innerHTML = Pages.test(user, lessonId);
      return;
    }
    if (route === '/support') {
      showLoading();
      try {
        const [faq, tickets] = await Promise.all([API.faq.list(), API.tickets.list()]);
        window._supportData = { faq, tickets };
      } catch (_) { window._supportData = { faq: [], tickets: [] }; }
      app.innerHTML = Pages.support(user);
      return;
    }
    if (route === '/profile') { app.innerHTML = Pages.profile(user); return; }
    if (route === '/admin') {
      const sub = parts[1];
      showLoading();
      try {
        if (sub === 'users') {
          const [users, analytics] = await Promise.all([API.users.list(), API.analytics.get()]);
          window._adminData = { users, analytics };
          app.innerHTML = Pages.adminUsers(user);
        } else if (sub === 'courses') {
          const [analytics] = await Promise.all([API.analytics.get()]);
          window._adminData = window._adminData || {};
          window._adminData.analytics = analytics;
          app.innerHTML = Pages.adminCourses(user);
        } else if (sub === 'analytics') {
          const [users, analytics] = await Promise.all([API.users.list(), API.analytics.get()]);
          window._adminData = { users, analytics };
          app.innerHTML = Pages.adminAnalytics(user);
        } else if (sub === 'tickets') {
          const tickets = await API.tickets.listAll();
          window._adminData = window._adminData || {};
          window._adminData.tickets = tickets;
          app.innerHTML = Pages.adminTickets(user);
        } else if (sub === 'faq') {
          const faq = await API.faq.list();
          window._adminData = window._adminData || {};
          window._adminData.faq = faq;
          app.innerHTML = Pages.adminFaq(user);
        } else { Router.go('/admin/analytics'); }
      } catch (e) {
        console.error(e);
        app.innerHTML = Layout(user, 'Ошибка', '<p style="color:red">Не удалось загрузить данные</p>');
      }
      return;
    }
    Router.go('/dashboard');
  }
};

// ========== EVENT DELEGATION ==========
document.addEventListener('click', function(e) {
  const t = e.target.closest('[data-nav]');
  const a = e.target.closest('[data-action]');
  const authTab = e.target.closest('[data-auth-tab]');
  const filter = e.target.closest('[data-filter]');
  const quizA = e.target.closest('.quiz-answer');

  if (t) { e.preventDefault(); Router.go(t.dataset.nav); return; }

  if (authTab) {
    e.preventDefault();
    const tab = authTab.dataset.authTab;
    document.getElementById('auth-content').innerHTML = tab === 'login' ? loginForm() : registerForm();
    document.querySelectorAll('.auth-tab').forEach(el => el.classList.toggle('active', el.dataset.authTab === tab));
    return;
  }

  if (filter) {
    window._courseFilter = filter.dataset.filter;
    App.render();
    return;
  }

  if (quizA && !window._testState?.submitted) {
    const qId = parseInt(quizA.dataset.q);
    const aId = parseInt(quizA.dataset.a);
    const multi = quizA.dataset.multi === 'true';
    if (!window._testState) window._testState = {answers:{},submitted:false,score:0};
    if (multi) {
      const sel = window._testState.answers[qId] || [];
      const idx = sel.indexOf(aId);
      if (idx > -1) sel.splice(idx, 1); else sel.push(aId);
      window._testState.answers[qId] = sel;
    } else {
      window._testState.answers[qId] = [aId];
    }
    // re-render answers for this question
    const qEl = quizA.closest('.quiz-answers');
    qEl.querySelectorAll('.quiz-answer').forEach(el => {
      const aIdEl = parseInt(el.dataset.a);
      const sel = window._testState.answers[qId] || [];
      const isS = sel.includes(aIdEl);
      el.classList.toggle('selected', isS);
      if (multi) {
        const cb = el.querySelector('.quiz-checkbox');
        if (cb) cb.innerHTML = isS ? '<svg viewBox="0 0 12 12" fill="white" width="10" height="10"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" fill="none"/></svg>' : '';
      } else {
        const rb = el.querySelector('.quiz-radio');
        if (rb) rb.innerHTML = isS ? '<div class="quiz-radio-dot"></div>' : '';
      }
    });
    return;
  }

  if (a) {
    const action = a.dataset.action;
    if (action === 'logout') {
      Auth.logout().then(() => Router.go('/'));
      return;
    }
    if (action === 'submit-test') {
      const lessonId = parseInt(a.dataset.lesson);
      const test = window._currentTest;
      if (!test) return;
      const state = window._testState || {answers:{}, submitted:false, score:0};
      let correct = 0, total = 0;
      (test.questions||[]).forEach(q => {
        const correctIds = (q.answers||[]).filter(a=>a.correct).map(a=>a.id).sort().join(',');
        const given = (state.answers[q.id] || []).sort().join(',');
        total++;
        if (correctIds === given) correct++;
      });
      const score = total > 0 ? Math.round((correct / total) * 100) : 0;
      state.score = score;
      state.submitted = true;
      window._testState = state;
      if (score >= 75) {
        Store.markComplete(lessonId, score).then(() => {
          toast(`✅ Тест пройден! Результат: ${score}%`, 'success');
          App.render();
        });
      } else {
        toast(`❌ Недостаточно баллов: ${score}%. Нужно 75%`, 'error');
        App.render();
      }
      return;
    }
    if (action === 'retry-test') {
      window._testState = null;
      App.render();
      return;
    }
    if (action === 'close-ticket' || action === 'progress-ticket') {
      const tid = parseInt(a.dataset.tid);
      const status = action === 'close-ticket' ? 'closed' : 'in_progress';
      const resp = document.getElementById(`resp-${tid}`)?.value || null;
      API.tickets.update(tid, status, resp).then(() => {
        toast(action === 'close-ticket' ? 'Обращение закрыто' : 'Статус изменён на «В работе»', 'success');
        App.render();
      }).catch(e => toast('Ошибка: ' + e.message, 'error'));
      return;
    }
    if (action === 'support-from-lesson') {
      window._prefillTicket = {
        title: `Вопрос по уроку: ${a.dataset.lessonTitle}`,
        msg: `Курс: ${a.dataset.course}\nУрок: ${a.dataset.lessonTitle}\n\nОпишите вашу проблему или вопрос:`
      };
      window._supportTab = 'tickets';
      Router.go('/support');
      return;
    }
    if (action === 'toggle-faq') {
      const id = a.dataset.faqId;
      const body = document.getElementById(`faq-body-${id}`);
      const chevron = document.getElementById(`faq-chevron-${id}`);
      if (body) {
        const open = body.style.display !== 'none';
        body.style.display = open ? 'none' : 'block';
        if (chevron) chevron.style.transform = open ? '' : 'rotate(180deg)';
      }
      return;
    }
    if (action === 'toggle-course-form') {
      window._showCourseForm = !window._showCourseForm;
      App.render();
      return;
    }
    if (action === 'delete-faq') {
      const id = parseInt(a.dataset.faqId);
      API.faq.delete(id).then(() => {
        toast('Статья удалена', 'success');
        App.render();
      }).catch(e => toast('Ошибка: ' + e.message, 'error'));
      return;
    }
    if (action === 'delete-course') {
      const id = parseInt(a.dataset.courseId);
      API.courses.delete(id).then(() => {
        Store._courses = null; // invalidate cache
        toast('Курс удалён', 'success');
        App.render();
      }).catch(e => toast('Ошибка: ' + e.message, 'error'));
      return;
    }
  }

  // Support tab switching
  const supportTab = e.target.closest('[data-support-tab]');
  if (supportTab) {
    e.preventDefault();
    window._prefillTicket = null;
    window._supportTab = supportTab.dataset.supportTab;
    App.render();
    return;
  }

  // FAQ category filter
  const faqCat = e.target.closest('[data-faq-cat]');
  if (faqCat) {
    e.preventDefault();
    window._faqCat = faqCat.dataset.faqCat;
    App.render();
    return;
  }
});

document.addEventListener('input', function(e) {
  if (e.target.id === 'faq-search') {
    const q = e.target.value.toLowerCase();
    const activeCat = window._faqCat || 'Все';
    document.querySelectorAll('.faq-card').forEach(card => {
      const matchSearch = !q || card.textContent.toLowerCase().includes(q);
      const matchCat = activeCat === 'Все' || card.dataset.category === activeCat;
      card.style.display = (matchSearch && matchCat) ? '' : 'none';
    });
  }
});

document.addEventListener('submit', function(e) {
  e.preventDefault();
  const form = e.target;
  if (form.id === 'login-form') {
    const email = document.getElementById('login-email').value;
    const pass = document.getElementById('login-pass').value;
    const btn = form.querySelector('[type=submit]');
    if (btn) btn.disabled = true;
    Auth.login(email, pass).then(res => {
      if (res.ok) {
        // Load courses & progress after login
        Store._courses = null;
        Promise.all([Store.loadCourses(), Store.loadProgress()]).then(() => Router.go('/dashboard'));
      } else {
        const errEl = document.getElementById('auth-error');
        errEl.textContent = res.error;
        errEl.classList.remove('hidden');
        if (btn) btn.disabled = false;
      }
    });
    return;
  }
  if (form.id === 'register-form') {
    const name = document.getElementById('reg-name').value;
    const email = document.getElementById('reg-email').value;
    const pass = document.getElementById('reg-pass').value;
    const btn = form.querySelector('[type=submit]');
    if (btn) btn.disabled = true;
    Auth.register(name, email, pass).then(res => {
      if (res.ok) {
        toast('Аккаунт создан!', 'success');
        Store._courses = null;
        Promise.all([Store.loadCourses(), Store.loadProgress()]).then(() => Router.go('/dashboard'));
      } else {
        const errEl = document.getElementById('auth-error');
        errEl.textContent = res.error;
        errEl.classList.remove('hidden');
        if (btn) btn.disabled = false;
      }
    });
    return;
  }
  if (form.id === 'ticket-form') {
    const title = document.getElementById('ticket-title').value;
    const msg = document.getElementById('ticket-msg').value;
    API.tickets.create(title, msg).then(() => {
      window._prefillTicket = null;
      window._supportData = null;
      toast('Обращение отправлено!', 'success');
      App.render();
    }).catch(e => toast('Ошибка: ' + e.message, 'error'));
    return;
  }
  if (form.id === 'admin-faq-form') {
    const cat = document.getElementById('faq-cat').value;
    const title = document.getElementById('faq-title').value;
    const content = document.getElementById('faq-content').value;
    API.faq.create(cat, title, content).then(() => {
      toast('Статья добавлена в базу знаний', 'success');
      App.render();
    }).catch(e => toast('Ошибка: ' + e.message, 'error'));
    return;
  }
  if (form.id === 'course-form') {
    const catVal = document.getElementById('cc-category').value;
    const catLabels = { os: 'Операционные системы', skzi: 'СКЗИ', office: 'Офисное ПО', other: 'Прочее' };
    const courseData = {
      title: document.getElementById('cc-title').value,
      category: catVal,
      categoryLabel: catLabels[catVal] || 'Прочее',
      color: document.getElementById('cc-color').value,
      description: document.getElementById('cc-desc').value,
      moduleTitle: document.getElementById('cc-module').value
    };
    API.courses.create(courseData).then(newCourse => {
      Store._courses = null; // invalidate cache
      window._showCourseForm = false;
      toast(`Курс «${newCourse.title}» создан!`, 'success');
      App.render();
    }).catch(e => toast('Ошибка: ' + e.message, 'error'));
    return;
  }
});

function changeRole(userId, newRole) {
  API.users.updateRole(userId, newRole).then(() => {
    toast('Роль пользователя изменена', 'success');
  }).catch(e => toast('Ошибка: ' + e.message, 'error'));
}

// ========== INIT ==========
Auth.init().then(() => Router.init());
</script>
